version: "3.8"

services:
    postgres:
        image: postgres:17
        container_name: prisma-postgres
        restart: always
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: prisma
            POSTGRES_PASSWORD: prisma
            POSTGRES_DB: prismadb
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data:
